<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <style>
      .node { fill: none; stroke: url(#grad); stroke-width: 3.5; }
      .dot { fill: url(#grad); }
    </style>
  </defs>
  <!-- Background rounded rect -->
  <rect width="100" height="100" rx="22" ry="22" fill="#06090e"/>
  <!-- S-curve paths -->
  <!-- Top arc of S -->
  <path class="node" d="M 62 20 Q 75 20 75 33 Q 75 46 50 50"/>
  <!-- Bottom arc of S -->
  <path class="node" d="M 38 80 Q 25 80 25 67 Q 25 54 50 50"/>
  <!-- Connection line top-left -->
  <path class="node" d="M 38 20 Q 25 20 25 33 Q 25 43 50 50"/>
  <!-- Connection line bottom-right -->
  <path class="node" d="M 62 80 Q 75 80 75 67 Q 75 57 50 50"/>
  <!-- Horizontal cap top -->
  <line class="node" x1="38" y1="20" x2="62" y2="20"/>
  <!-- Horizontal cap bottom -->
  <line class="node" x1="38" y1="80" x2="62" y2="80"/>
  <!-- Neural nodes (dots) -->
  <circle class="dot" cx="50" cy="20" r="4.5"/>
  <circle class="dot" cx="25" cy="33" r="4.5"/>
  <circle class="dot" cx="75" cy="33" r="4.5"/>
  <circle class="dot" cx="50" cy="50" r="5.5"/>
  <circle class="dot" cx="25" cy="67" r="4.5"/>
  <circle class="dot" cx="75" cy="67" r="4.5"/>
  <circle class="dot" cx="50" cy="80" r="4.5"/>
</svg>
